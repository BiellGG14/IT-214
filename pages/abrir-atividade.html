<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Abrir Atividade — IT-214</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto", "Oxygen",
        "Ubuntu", "Cantarell", "Fira Sans", "Droid Sans", "Helvetica Neue",
        sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 40px;
      max-width: 500px;
      width: 100%;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 10px;
      color: #334155;
      text-align: center;
    }

    .subtitle {
      text-align: center;
      color: #94a3b8;
      margin-bottom: 30px;
      font-size: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      margin-bottom: 30px;
    }

    .activity-btn {
      padding: 12px;
      border: 2px solid #e2e8f0;
      background: #f8fafc;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      color: #334155;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .activity-btn:hover {
      border-color: #667eea;
      background: #eef2ff;
      color: #667eea;
      transform: translateY(-2px);
    }

    .activity-btn:active {
      transform: translateY(0);
    }

    .divider {
      height: 1px;
      background: #e2e8f0;
      margin: 30px 0;
    }

    .quick-links {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .quick-link {
      padding: 12px 16px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      text-decoration: none;
      color: #334155;
      font-size: 14px;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .quick-link:hover {
      background: #eef2ff;
      border-color: #667eea;
      color: #667eea;
    }

    .quick-link::before {
      content: "→";
      font-weight: bold;
    }

    .info {
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      border-radius: 8px;
      padding: 12px;
      font-size: 12px;
      color: #1e40af;
      margin-top: 20px;
      line-height: 1.6;
    }

    .info strong {
      display: block;
      margin-bottom: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚀 Abrir Atividade</h1>
    <p class="subtitle">IT-214 — Mobilidade Aérea Urbana</p>

    <div class="grid" id="activities-grid">
      <!-- Botões criados por JavaScript -->
    </div>

    <div class="divider"></div>

    <div class="quick-links">
      <a href="index.html" class="quick-link">Página Inicial</a>
      <a href="atividades.html" class="quick-link">Ver Todas as Atividades</a>
    </div>

    <div class="info">
      <strong>💡 Dica:</strong> Instale a extensão "Live Server" no VS Code e clique com direito em qualquer página para "Open with Live Server". Assim, o navegador atualiza automaticamente quando você salva um arquivo!
    </div>
  </div>

  <script>
    // Gerar botões para cada atividade
    const grid = document.getElementById('activities-grid');
    const TOTAL = 10;

    for (let i = 1; i <= TOTAL; i++) {
      const id = String(i).padStart(2, '0');
      const link = document.createElement('a');
      link.href = `atividade.html?id=${id}`;
      link.className = 'activity-btn';
      link.textContent = id;
      link.title = `Abrir Atividade ${id}`;
      grid.appendChild(link);
    }
  </script>
</body>
</html>
