<svg width="64" height="64" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Logo ITA - Asas e símbolo -->
  <defs>
    <linearGradient id="ita-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFA500;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Wings left -->
  <path d="M 30 100 Q 20 80 40 70 Q 50 65 60 75 L 80 90 Z" fill="url(#ita-gradient)" stroke="#333" stroke-width="2"/>
  
  <!-- Center circle with T -->
  <circle cx="100" cy="100" r="30" fill="#1a3a5e" stroke="#FFD700" stroke-width="3"/>
  <text x="100" y="115" font-size="40" font-weight="bold" fill="#FFD700" text-anchor="middle" font-family="Arial, sans-serif">T</text>
  
  <!-- Wings right -->
  <path d="M 170 100 Q 180 80 160 70 Q 150 65 140 75 L 120 90 Z" fill="url(#ita-gradient)" stroke="#333" stroke-width="2"/>
  
  <!-- Bottom gear/circle -->
  <circle cx="100" cy="150" r="20" fill="#1a3a5e" stroke="#FFD700" stroke-width="2"/>
  <circle cx="100" cy="150" r="12" fill="none" stroke="#FFD700" stroke-width="2"/>
  
  <!-- Decorative elements -->
  <circle cx="75" cy="55" r="3" fill="#e8601c"/>
  <circle cx="125" cy="55" r="3" fill="#e8601c"/>
</svg>
